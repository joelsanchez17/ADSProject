<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RISC-V Cloud IDE</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script src="/static/client.js" defer></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>

    <style>
        /* === NEW CLOUD IDE LAYOUT === */
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #1e1e1e; color: #fff; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #252526; border-bottom: 1px solid #3e3e42; }
        .brand { font-size: 16px; font-weight: bold; color: #38bdf8; }

        /* Split Screen Container */
        .ide-container { display: flex; height: calc(100vh - 50px); width: 100%; }

        /* Left Panel: Editor */
        .editor-panel { width: 35%; display: flex; flex-direction: column; border-right: 1px solid #3e3e42; background: #1e1e1e; }
        .editor-tabs { display: flex; background: #2d2d30; }
        .tab { padding: 8px 15px; background: #2d2d30; border: none; color: #888; cursor: pointer; font-family: monospace; font-size: 13px; }
        .tab.active { background: #1e1e1e; color: #fff; border-top: 2px solid #38bdf8; }

        #monaco-container { flex-grow: 1; width: 100%; }

        .compile-bar { padding: 10px; background: #252526; border-top: 1px solid #3e3e42; display: flex; justify-content: flex-end; }
        .btn-compile { background: #007acc; color: white; border: none; padding: 8px 16px; cursor: pointer; font-weight: bold; border-radius: 3px; }
        .btn-compile:hover { background: #0098ff; }

        /* Right Panel: Visualizer & Console */
        .right-panel { width: 65%; display: flex; flex-direction: column; }

        .viz-top { display: flex; height: 75%; }
        .viz-area { flex-grow: 1; padding: 10px; overflow: auto; display: flex; justify-content: center; align-items: center; }
        .sidebar { width: 300px; background: #252526; padding: 10px; overflow-y: auto; border-left: 1px solid #3e3e42; }

        /* Console Output Panel */
        .console-panel { height: 25%; background: #000; border-top: 1px solid #3e3e42; display: flex; flex-direction: column; }
        .console-header { background: #2d2d30; padding: 5px 10px; font-size: 12px; color: #ccc; text-transform: uppercase; }
        #console-output { flex-grow: 1; padding: 10px; font-family: monospace; font-size: 13px; color: #d4d4d4; overflow-y: auto; white-space: pre-wrap; }
        .log-error { color: #f48771; }
        .log-success { color: #89d185; }

        /* Existing View Toggles */
        .toggles { display: flex; gap: 15px; font-size: 12px; }
        .toggle-btn { cursor: pointer; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="brand">⚡ RISC-V CHISEL CLOUD IDE</div>
    <div class="toggles">
        <label class="toggle-btn"><input type="checkbox" id="chk-haz" checked> Hazards</label>
        <label class="toggle-btn"><input type="checkbox" id="chk-path" checked> Datapath</label>
    </div>
    <div class="controls">
        <button onclick="sendCommand('step')">⏭ Step</button>
        <button onclick="sendCommand('reset')" style="background:#d32f2f;">🔄 Reset</button>
    </div>
</div>

<div class="ide-container">

    <div class="editor-panel">
        <div class="editor-tabs">
            <button class="tab active" onclick="switchTab('HazardUnit.scala')">HazardUnit.scala</button>
            <button class="tab" onclick="switchTab('ALU.scala')">ALU.scala</button>
            <button class="tab" onclick="switchTab('test_prog.s')">test_prog.s</button>
        </div>

        <div id="monaco-container"></div>

        <div class="compile-bar">
            <button class="btn-compile" onclick="compileCode()">▶ Compile & Simulate</button>
        </div>
    </div>

    <div class="right-panel">
        <div class="viz-top">
            <div class="viz-area">
                <object id="pipeline-svg" data="/static/pipeline.svg" type="image/svg+xml" style="width: 100%; height: 100%;"></object>
            </div>

            <div class="sidebar">
                <div class="panel-header">Pipeline Status</div>
                <div id="hazard-list" style="margin-bottom: 15px; font-size: 12px;">System Ready...</div>

                <div class="panel-header">Register File</div>
                <div class="reg-grid" id="reg-grid"></div>
            </div>
        </div>

        <div class="console-panel">
            <div class="console-header">Terminal Output</div>
            <div id="console-output">Welcome to SonicRV Cloud IDE.<br>Ready to compile...</div>
        </div>
    </div>
</div>

<script>
    let editor;
    let currentFile = 'HazardUnit.scala'; // Start on this file

    // Define the skeletons for the students!
    const codes = {
        'HazardUnit.scala': `package student_code\nimport chisel3._\n\nclass HazardUnit extends Module {\n  val io = IO(new Bundle {\n    val rs1_addr = Input(UInt(5.W))\n    val stall = Output(Bool())\n  })\n  \n  // TODO: Implement load-use stall logic\n  io.stall := false.B\n}`,

        'ALU.scala': `package student_code\nimport chisel3._\n\nclass ALU extends Module {\n  val io = IO(new Bundle {\n    val a = Input(UInt(32.W))\n    val b = Input(UInt(32.W))\n    val result = Output(UInt(32.W))\n  })\n  \n  // TODO: Implement ALU operations\n  io.result := io.a + io.b\n}`,

        'test_prog.s': `# Write your RISC-V Assembly here\naddi x1, x0, 5\naddi x2, x0, 10\nadd x3, x1, x2`
    };

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('monaco-container'), {
            value: codes[currentFile],
            language: 'scala',
            theme: 'vs-dark',
            automaticLayout: true,
            minimap: { enabled: false }
        });

        // Save typing to the correct file
        editor.onDidChangeModelContent(() => {
            codes[currentFile] = editor.getValue();
        });
    });

    function switchTab(filename) {
        currentFile = filename;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');

        const lang = filename.endsWith('.s') ? 'ini' : 'scala';
        monaco.editor.setModelLanguage(editor.getModel(), lang);
        editor.setValue(codes[filename]);
    }

    async function compileCode() {
        const consoleOut = document.getElementById('console-output');
        consoleOut.innerHTML = "<span style='color: #38bdf8;'>[info] Submitting code to server...</span>\n";
        consoleOut.innerHTML += "<span style='color: #888;'>[info] Booting JVM and running SBT. This may take 10-20 seconds...</span>\n";

        try {
            // Separate the Scala files from the Assembly file
            const scalaFiles = {};
            for (const [name, content] of Object.entries(codes)) {
                if (name.endsWith('.scala')) scalaFiles[name] = content;
            }

            const response = await fetch('/compile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    scala_files: scalaFiles,
                    asm_code: codes['test_prog.s']
                })
            });

            const data = await response.json();

            // Print the terminal logs to the console!
            consoleOut.innerHTML = `<span style="color: #ccc;">${data.logs}</span>\n`;

            if (data.status === "success") {
                consoleOut.innerHTML += `\n<span class='log-success'>[success] ${data.message}</span>\n`;
            } else {
                consoleOut.innerHTML += `\n<span class='log-error'>[error] ${data.message}</span>\n`;
            }

        } catch (error) {
            consoleOut.innerHTML += `<span class='log-error'>[error] Network connection failed. Is the Python server running?</span>\n`;
        }
    }
</script>

</body>
</html>
