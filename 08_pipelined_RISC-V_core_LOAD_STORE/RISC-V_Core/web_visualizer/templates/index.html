<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RISC-V Cloud IDE</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script src="/static/client.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>

    <style>
        /* === CLOUD IDE LAYOUT === */
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #1e1e1e; color: #fff; font-family: sans-serif; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #252526; border-bottom: 1px solid #3e3e42; }
        .brand { font-size: 16px; font-weight: bold; color: #38bdf8; }

        .ide-container { display: flex; height: calc(100vh - 40px); width: 100%; }

        /* === LEFT PANEL: EDITOR === */
        .editor-panel { width: 45%; display: flex; flex-direction: column; border-right: 1px solid #3e3e42; background: #1e1e1e; }

        /* 🚨 THE GLITCH FIX: PERFECT HEADER LAYOUT 🚨 */
        .editor-header {
            display: flex;
            justify-content: space-between; /* Tabs on left, Buttons on right */
            align-items: center;
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            padding-right: 10px;
        }

        .editor-tabs { display: flex; }

        .tab {
            background: #2d2d30; color: #888; border: none; padding: 10px 15px;
            cursor: pointer; outline: none; border-right: 1px solid #1e1e1e; font-size: 13px;
        }
        .tab.active { background: #1e1e1e; color: #fff; border-top: 2px solid #007acc; }

        .editor-actions { display: flex; gap: 8px; }
        .action-btn { padding: 6px 12px; border-radius: 4px; color: white; cursor: pointer; border: none; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn-reset { background: #e43a3a; }
        .btn-reset:hover { background: #c93030; }
        .btn-compile { background: #007acc; }
        .btn-compile:hover { background: #005f9e; }

        /* The min-height: 0 prevents Monaco from breaking the flexbox! */
        #monaco-container { flex: 1; min-height: 0; }

        /* Terminal */
        .terminal-panel { height: 30%; background: #1e1e1e; border-top: 1px solid #3e3e42; display: flex; flex-direction: column; }
        .terminal-header { background: #252526; padding: 5px 10px; font-size: 12px; color: #ccc; border-bottom: 1px solid #3e3e42; }
        .terminal-content { flex: 1; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 13px; color: #d4d4d4; }

        /* === RIGHT PANEL: VISUALIZER === */
        .visualizer-panel { width: 55%; display: flex; flex-direction: column; background: #1e1e1e; padding: 10px; overflow-y: auto; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; padding: 10px; background: #252526; border-radius: 5px; align-items: center;}
        .step-btn { background: #4caf50; padding: 8px 15px; border-radius: 4px; color: white; border: none; font-weight: bold; cursor: pointer; }

        .reg-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin-top: 15px; }
        .reg-box { background: #252526; border: 1px solid #333; padding: 5px; text-align: center; border-radius: 4px; }
        .reg-name { font-size: 10px; color: #888; display: block; }
        .reg-val { font-family: monospace; font-size: 12px; color: #4ec9b0; margin-top: 2px; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="brand">RISC-V Cloud IDE</div>
</div>

<div class="ide-container">
    <div class="editor-panel">

        <div class="editor-header">
            <div class="editor-tabs">
                <button id="tab-haz" class="tab active" onclick="switchTab('HazardDetection.scala')">HazardDetection.scala</button>
                <button id="tab-alu" class="tab" onclick="switchTab('ALU.scala')">ALU.scala</button>
                <button id="tab-asm" class="tab" onclick="switchTab('test_prog.s')">test_prog.s</button>
            </div>

            <div class="editor-actions">
                <button onclick="resetCode()" class="action-btn btn-reset">Reset</button>
                <button onclick="compileCode()" class="action-btn btn-compile">Compile & Simulate</button>
            </div>
        </div>

        <div id="monaco-container"></div>

        <div class="terminal-panel">
            <div class="terminal-header">Terminal Output</div>
            <div id="console-output" class="terminal-content"></div>
        </div>
    </div>

    <div class="visualizer-panel">
        <div class="controls">
            <button onclick="sendCommand('back')" class="step-btn" style="background: #e67e22;">◀ Back</button>
            <button onclick="sendCommand('step')" class="step-btn">Step ▶</button>
            <button onclick="sendCommand('run', 5)" class="step-btn" style="background: #3498db;">Run 5 ▶▶</button>
            <button onclick="sendCommand('reset')" class="step-btn" style="background: #e74c3c;">Reset</button>
        </div>

        <div style="background: #1e1e1e; border: 1px solid #333; border-radius: 5px; padding: 10px; text-align: center; overflow-x: auto;">
            <object id="pipeline-svg" data="/static/pipeline.svg" type="image/svg+xml" style="max-width: 100%;"></object>
        </div>

        <h3 style="color: #bbb; font-size: 14px; margin: 15px 0 5px 0;">Register File</h3>
        <div class="reg-grid" id="reg-grid"></div>
    </div>
</div>

<script>
    let editor;
    let currentFile = 'HazardDetection.scala';

    // Default Fallback Codes
    const codes = {
        'HazardDetection.scala': `package core_tile\n\nimport chisel3._\nimport chisel3.experimental.ChiselEnum\nimport chisel3.util._\n\nclass HazardDetectionUnit extends Module {\n    val io = IO(new Bundle {\n        val instr = Input(UInt(32.W))\n        val ex_RD = Input(UInt(32.W))\n        val ex_memRd = Input(memRdOpT())\n        val id_stall = Output(UInt(1.W))\n        val if_stall = Output(UInt(1.W))\n        val pcWrite = Output(UInt(1.W))\n        val coreDone = Output(UInt(1.W))\n    })\n    \n    // Write your hazard logic here!\n    io.id_stall := 0.U\n    io.if_stall := 0.U\n    io.pcWrite  := 1.U\n    io.coreDone := 0.U\n}`,

        'ALU.scala': `package core_tile\n\nimport chisel3._\nimport chisel3.experimental.ChiselEnum\nimport chisel3.util._\n\nimport ALUOpT._\n\nclass ALU extends Module {\n    val io = IO(new Bundle {\n        val ALUOp = Input(ALUOpT())\n        val operandA = Input(UInt(32.W))\n        val operandB = Input(UInt(32.W))\n        val aluResult = Output(UInt(32.W))\n    })\n    \n    // Write your ALU logic here!\n    io.aluResult := io.operandA + io.operandB\n}`,

        'test_prog.s': `# Write your RISC-V Assembly here\naddi x1, x0, 5\naddi x2, x0, 10\nadd x3, x1, x2`
    };

    // 1. RECOVERY SYSTEM: Check localStorage
    const savedCodes = localStorage.getItem('chisel_ide_codes');
    if (savedCodes) {
        try { Object.assign(codes, JSON.parse(savedCodes)); }
        catch (e) { console.error("Could not load saved code."); }
    }

    // Initialize Monaco
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('monaco-container'), {
            value: codes[currentFile],
            language: 'scala',
            theme: 'vs-dark',
            automaticLayout: true,
            minimap: { enabled: false }
        });

        // 2. AUTO-SAVE SYSTEM
        editor.onDidChangeModelContent(() => {
            codes[currentFile] = editor.getValue();
            localStorage.setItem('chisel_ide_codes', JSON.stringify(codes));
        });
    });

    function switchTab(filename) {
        if (!editor) return;
        currentFile = filename;

        document.getElementById('tab-haz').classList.remove('active');
        document.getElementById('tab-alu').classList.remove('active');
        document.getElementById('tab-asm').classList.remove('active');

        if(filename === 'HazardDetection.scala') document.getElementById('tab-haz').classList.add('active');
        if(filename === 'ALU.scala') document.getElementById('tab-alu').classList.add('active');
        if(filename === 'test_prog.s') document.getElementById('tab-asm').classList.add('active');

        const lang = filename.endsWith('.s') ? 'ini' : 'scala';
        monaco.editor.setModelLanguage(editor.getModel(), lang);
        editor.setValue(codes[filename]);
    }

    // 3. RESET BUTTON LOGIC
    function resetCode() {
        if(confirm("Are you sure? This will delete your code and restore the default skeleton.")) {
            localStorage.removeItem('chisel_ide_codes');
            location.reload();
        }
    }

    // --- WEBSOCKET LOG STREAMING ---
    socket.on('build_log', (data) => {
        const consoleOut = document.getElementById('console-output');
        if(consoleOut) {
            consoleOut.innerHTML += `<span style="color: #d4d4d4;">${data.line}</span>`;
            consoleOut.scrollTop = consoleOut.scrollHeight;
        }
    });

    async function compileCode() {
        const consoleOut = document.getElementById('console-output');
        consoleOut.style.whiteSpace = "pre-wrap";
        consoleOut.innerHTML = "<span style='color: #38bdf8;'>[info] Submitting code to server...</span>\n";

        try {
            const scalaFiles = {};
            for (const [name, content] of Object.entries(codes)) {
                if (name.endsWith('.scala')) scalaFiles[name] = content;
            }

            const response = await fetch('/compile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    scala_files: scalaFiles,
                    asm_code: codes['test_prog.s'],
                    session_id: window.currentSessionId
                })
            });

            const data = await response.json();

            // Dump Snapshot
            if (data.logs) {
                consoleOut.innerHTML = `<span style="color: #d4d4d4;">${data.logs}</span>\n`;
                consoleOut.scrollTop = consoleOut.scrollHeight;
            }

            if (data.status === "success") {
                consoleOut.innerHTML += `\n<span class='log-success'>[success] ${data.message}</span>\n`;
                window.currentSessionId = data.session_id;
                sendCommand('init');
            } else {
                consoleOut.innerHTML += `\n<span class='log-error'>[error] ${data.message}</span>\n`;
            }

        } catch (error) {
            console.error(error);
            consoleOut.innerHTML += `\n<span class='log-error'>[error] JS Error: ${error.message}</span>\n`;
        }
    }
</script>

</body>
</html>
