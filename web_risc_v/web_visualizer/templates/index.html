<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RISC-V Cloud IDE</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script>
        const socket = io();
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>

    <style>
        /* === PROFESSIONAL ACADEMIC EDA THEME === */
        :root {
            --bg-base: #181a1f;       /* Deep matte slate for main background */
            --bg-panel: #21252b;      /* Slightly lighter for panels */
            --bg-darker: #141518;     /* Inset areas like terminal */
            --border: #353b45;        /* Soft structured borders */
            --accent: #4A90E2;        /* Academic scientific blue */
            --accent-hover: #357ABD;
            --text-main: #d7dae0;     /* Soft white for readability */
            --text-muted: #8b929e;
            --tab-active: #282c34;
            --tab-inactive: #1e2227;
            --success: #98c379;       /* Matte green for data writes */
            --danger: #e06c75;
            --warning: #e5c07b;
        }

        /* Native Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-darker); }
        ::-webkit-scrollbar-thumb { background: #4b5363; border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: #5c6370; }

        body {
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background: var(--bg-base); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            border-top: 3px solid var(--accent); /* Institutional top accent line */
        }

        /* --- TOOLBAR --- */
        .toolbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 20px; background: var(--bg-panel);
            border-bottom: 1px solid var(--border); z-index: 10;
        }
        .brand { font-size: 15px; font-weight: 600; color: #abb2bf; letter-spacing: 1px; }
        .brand span { color: var(--accent); font-weight: 700; }

        .controls { display: flex; gap: 8px; }
        .btn {
            background: var(--bg-base); color: var(--text-main); border: 1px solid var(--border);
            padding: 5px 12px; cursor: pointer; border-radius: 3px; font-weight: 500;
            font-size: 12px; transition: all 0.15s ease; display: flex; align-items: center; gap: 6px;
        }
        .btn:hover { background: #2c313a; border-color: #abb2bf; color: #fff; }
        .btn-compile { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-compile:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

        /* --- WORKSPACE --- */
        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* Left Sidebar: File Tree */
        .sidebar-tree { width: 250px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 5; }
        .tree-header { padding: 10px 15px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--bg-darker); }
        .tree-content { flex: 1; overflow-y: auto; padding-top: 8px; padding-bottom: 20px; }

        .tree-item { padding: 4px 15px; cursor: pointer; font-size: 13px; display: flex; align-items: center; user-select: none; border-left: 3px solid transparent; color: #abb2bf; }
        .tree-item:hover { background: #2c313a; }
        .tree-item.active { background: #282c34; color: #fff; border-left: 3px solid var(--accent); }
        .indent-1 { padding-left: 25px; }
        .icon { width: 20px; text-align: center; margin-right: 6px; font-size: 13px; opacity: 0.8; }

        /* Center Main Area */
        .main-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-base); min-width: 0; }

        /* Tabs Bar */
        .editor-tabs { display: flex; background: var(--bg-darker); border-bottom: 1px solid var(--border); align-items: center; }
        .tab {
            padding: 8px 20px; background: var(--tab-inactive); border: none; color: var(--text-muted);
            cursor: pointer; font-size: 12px; font-weight: 600; display: flex; align-items: center;
            border-right: 1px solid var(--border); border-top: 2px solid transparent; transition: all 0.1s;
        }
        .tab.active { background: var(--tab-active); color: var(--text-main); border-top: 2px solid var(--accent); }
        .tab:hover:not(.active) { background: #2c313a; color: #ddd; }

        /* 🚨 NEW: PROFESSIONAL TELEMETRY CYCLE BADGE */
        .telemetry-group { display: flex; align-items: center; padding-right: 15px; gap: 10px; }

        .cycle-badge {
            display: flex; align-items: stretch; background: var(--bg-panel);
            border: 1px solid var(--border); border-radius: 3px; overflow: hidden;
            font-family: 'SFMono-Regular', Consolas, 'Courier New', monospace; font-size: 12px;
        }
        .cycle-label { background: var(--bg-darker); color: var(--text-muted); padding: 4px 10px; font-weight: 600; text-transform: uppercase; font-size: 10px; display: flex; align-items: center; border-right: 1px solid var(--border); }
        .cycle-value { padding: 4px 12px; color: var(--accent); font-weight: bold; background: #1e2227; }

        /* Dynamic Containers */
        .content-container { flex: 1; display: flex; position: relative; }
        #monaco-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #viz-container { width: 100%; height: 100%; display: none; background: var(--bg-base); }

        /* Visualizer Layout */
        .viz-svg { flex: 2; padding: 20px; display: flex; justify-content: center; align-items: center; overflow: auto; background: var(--bg-base); }
        .viz-sidebar { flex: 1; border-left: 1px solid var(--border); background: var(--bg-panel); display: flex; flex-direction: column; max-width: 400px; z-index: 5; }

        /* Sidebar Panels (Toggles & Regs) */
        .panel-header { background: var(--bg-darker); padding: 8px 15px; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); border-top: 1px solid var(--border); }
        .viz-sidebar .panel-header:first-child { border-top: none; }

        .toggles-container { padding: 12px 15px; font-size: 12px; display: flex; gap: 20px; background: var(--bg-panel); }
        .toggles-container label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #abb2bf; }
        .toggles-container input[type="checkbox"] { accent-color: var(--accent); }

        /* 🚨 NEW: TABULAR REGISTER DATA GRID */
        .reg-grid-container { flex: 1; overflow-y: auto; padding: 12px; background: var(--bg-panel); }
        .reg-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 3px; }

        .reg-box {
            background: var(--bg-panel); padding: 6px 4px; text-align: center; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
        }
        .reg-name { font-size: 10px; color: var(--text-muted); font-family: 'SFMono-Regular', Consolas, monospace; margin-bottom: 2px; }
        .reg-val { font-size: 12px; font-family: 'SFMono-Regular', Consolas, monospace; color: var(--text-main); letter-spacing: 0.5px; }

        /* Clean Technical Highlight for Writes */
        .active-write {
            background: rgba(152, 195, 121, 0.1);
        }
        .active-write::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid var(--success); pointer-events: none;
        }

        /* --- TERMINAL --- */
        .terminal-panel { height: 25%; background: var(--bg-darker); border-top: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .terminal-header { background: var(--bg-panel); padding: 5px 15px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); font-weight: 700; }
        .terminal-header button { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 2px 5px; font-size: 11px; transition: 0.1s; }
        .terminal-header button:hover { color: var(--text-main); }

        #console-output { flex: 1; padding: 10px 15px; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; overflow-y: auto; color: #abb2bf; line-height: 1.5; }

        .term-line { display: block; word-break: break-all; }
        .term-info { color: var(--accent); font-weight: bold; }
        .term-error { color: var(--danger); font-weight: bold; }
        .term-success { color: var(--success); font-weight: bold; }
        .term-chisel { color: #c678dd; font-weight: bold; }
        .term-user { color: #56b6c2; }
        .term-cycle { color: var(--warning); border-left: 2px solid var(--warning); padding-left: 8px; margin-top: 2px; background: rgba(229, 192, 123, 0.05); }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="brand">🎓 <span>RISC-V</span> Architecture Simulator</div>
    <div class="controls">
        <button class="btn" onclick="exportProject()" title="Save source files">⬇️ Export</button>
        <button class="btn" style="color: var(--warning);" onclick="resetCurrentFile()" title="Reset the currently open file">↻ Reset File</button>
        <button class="btn" style="color: var(--danger);" onclick="resetAllCode()" title="Reset the entire project">⚠ Reset All</button>
        <button class="btn btn-compile" onclick="compileCode()">▶ Compile & Simulate</button>
    </div>
</div>

<div class="workspace">
    <div class="sidebar-tree">
        <div class="tree-header">Project Explorer</div>
        <div class="tree-content">
            <div class="tree-item"><span class="icon">📂</span> core_tile</div>
            <div class="tree-item indent-1" id="tree-haz" onclick="switchTab('HazardDetection.scala')"><span class="icon">📄</span> HazardDetection.scala</div>
            <div class="tree-item indent-1" id="tree-alu" onclick="switchTab('ALU.scala')"><span class="icon">📄</span> ALU.scala</div>

            <div class="tree-item" style="margin-top: 15px;"><span class="icon">📂</span> programs</div>
            <div class="tree-item indent-1" id="tree-asm" onclick="switchTab('test_prog.s')"><span class="icon">📄</span> test_prog.s</div>
        </div>
    </div>

    <div class="main-area">
        <div class="editor-tabs">
            <button id="tab-code" class="tab active" onclick="switchTab(currentFile)">📝 Code Editor</button>
            <button id="tab-viz" class="tab" onclick="switchView('viz')"> Pipeline Visualizer</button>

            <div style="flex: 1;"></div>

            <div class="telemetry-group">
                <button class="btn" style="height: 24px; padding: 0 10px;" onclick="sendCommand('reset')" title="Restart to Cycle 0">⏮ Restart</button>
                <button class="btn" style="height: 24px; padding: 0 10px;" onclick="sendCommand('back')" title="Step Back 1 Cycle">◀ Back</button>
                <button class="btn" style="height: 24px; padding: 0 10px;" onclick="sendCommand('step')" title="Step Forward 1 Cycle">Step ▶</button>
                <button class="btn" style="height: 24px; padding: 0 10px;" onclick="sendCommand('run', 5)" title="Fast Forward 5 Cycles">Fast ▶▶</button>

                <div class="cycle-badge" style="margin-left: 8px;">
                    <span class="cycle-label">Cycle</span>
                    <span class="cycle-value" id="ui-cycle-count">0</span>
                </div>
            </div>
        </div>

        <div class="content-container">
            <div id="monaco-container"></div>

            <div id="viz-container">
                <div class="viz-svg">
                    <object id="pipeline-svg" data="/static/pipeline.svg" type="image/svg+xml" style="width: 100%; height: 100%;"></object>
                </div>
                <div class="viz-sidebar">
                    <div class="panel-header">Display Toggles</div>
                    <div class="toggles-container">
                        <label><input type="checkbox" id="chk-haz" checked> Show Hazards</label>
                        <label><input type="checkbox" id="chk-path" checked> Datapath</label>
                    </div>
                    <div class="panel-header">Register Memory Bank</div>
                    <div class="reg-grid-container">
                        <div class="reg-grid" id="reg-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="terminal-panel">
    <div class="terminal-header">
        <span>Console Output</span>
        <button onclick="clearTerminal()">[ Clear ]</button>
    </div>
    <div id="console-output">
        <div class="term-line">System booted. Environment ready.</div>
    </div>
</div>

<script>
    // ==========================================
    // 🛠️ FAILSAFE DEBUGGER TOOL 🛠️
    // ==========================================
    window.addEventListener('error', function(event) {
        const consoleOut = document.getElementById('console-output');
        if (consoleOut) {
            consoleOut.innerHTML += `<div style="color: #fff; font-weight: bold; background: #d32f2f; padding: 10px; margin-top: 5px; border-radius: 3px;">🚨 FATAL JS CRASH: ${event.message} (Line ${event.lineno})</div>`;
            consoleOut.scrollTop = consoleOut.scrollHeight;
        }
    });

    // ==========================================
    // 1. GLOBAL VARIABLES & SETUP
    // ==========================================
    let editor;
    let currentFile = '';
    let codes = {};
    let lastPacket = null;

    window.currentSessionId = localStorage.getItem('chisel_session_id') || null;

    if (socket.connected && window.currentSessionId) {
        socket.emit('join_session', window.currentSessionId);
    }
    socket.on('connect', () => {
        if (window.currentSessionId) socket.emit('join_session', window.currentSessionId);
    });

    // ==========================================
    // 2. TERMINAL LOGIC
    // ==========================================
    function appendTerminal(text, type = 'default') {
        const consoleOut = document.getElementById('console-output');
        if (!consoleOut || !text.trim()) return;

        let cssClass = 'term-line';
        let formattedText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");

        if (type === 'user') {
            cssClass += ' term-user';
            formattedText = `> ${formattedText}`;
        } else if (formattedText.includes('[info]')) {
            formattedText = formattedText.replace('[info]', '<span class="term-info">[info]</span>');
        } else if (formattedText.includes('[error]')) {
            cssClass += ' term-error';
        } else if (formattedText.includes('[success]')) {
            cssClass += ' term-success';
        } else if (formattedText.includes('[CHISEL]')) {
            formattedText = formattedText.replace('[CHISEL]', '<span class="term-chisel">[HW]</span>');
        } else if (formattedText.includes('▶ Cycle')) {
            cssClass += ' term-cycle';
        } else if (formattedText.includes('[DEBUG]')) {
            cssClass += ' term-cycle';
            formattedText = `<span style="color: #c678dd; font-weight: bold;">${formattedText}</span>`;
        }

        const lineDiv = document.createElement('div');
        lineDiv.className = cssClass;
        lineDiv.innerHTML = formattedText;
        consoleOut.appendChild(lineDiv);
        consoleOut.scrollTop = consoleOut.scrollHeight;
    }

    function clearTerminal() {
        document.getElementById('console-output').innerHTML = '';
    }

    socket.on('build_log', (data) => appendTerminal(data.line));

    // ==========================================
    // 3. HARDWARE COMMUNICATION & VISUALIZER
    // ==========================================
    function sendCommand(action, val=null) {
        if (!window.currentSessionId) return;
        const payload = { action: action, session_id: window.currentSessionId };
        let cmdEcho = action.toUpperCase();

        if (val) { payload.value = val; cmdEcho += ` ${val}`; }
        if (action !== 'init') appendTerminal(`Command: ${cmdEcho}`, 'user');

        socket.emit('command', payload);
    }

    socket.on('update', (packet) => {
        lastPacket = packet;

        // 🛠️ INJECT THE DEBUGGER: Inspect EX Stage
        const asmEx = (packet.enriched.asm?.ex || "").trim().toLowerCase();
        if (asmEx.startsWith("b") || asmEx.startsWith("j")) {
            const pcSrc = packet.enriched.ex?.pc_src;
            const pcJb = packet.enriched.ex?.pc_jb;
            appendTerminal(`[DEBUG] EX Stage has '${asmEx}'. Hardware signals -> pc_src: ${pcSrc}, pc_jb: ${pcJb}`);
        }

        updateSVG(packet.enriched);
        updateRegisters(packet.registers, packet.enriched.wb);

        // 🚨 FIXED: Check both locations for the cycle number!
        const cycleUI = document.getElementById('ui-cycle-count');
        const currentCycle = packet.cycle !== undefined ? packet.cycle : packet.enriched?.cycle;

        if (cycleUI && currentCycle !== undefined) {
            cycleUI.innerText = currentCycle;
        }
    });

    // --- 5. UPDATE THE SVG VISUALIZER ---
    function updateSVG(data) {
        try {
            let svgDoc = document;
            const svgObj = document.getElementById('pipeline-svg');
            if (svgObj && svgObj.contentDocument) svgDoc = svgObj.contentDocument;

            const bg = svgDoc.querySelector('rect');
            if (bg) {
                bg.setAttribute('fill', '#21252b');
                setTimeout(() => bg.setAttribute('fill', '#181a1f'), 150);
            }

            const setText = (id, text, color) => {
                const el = svgDoc.getElementById(id);
                if (el) {
                    el.textContent = text;
                    if (color) el.setAttribute('fill', color);
                }
            };

            const toHex = (val) => "0x" + (val >>> 0).toString(16).padStart(8, '0');

            setText('txt-pc-if', `PC: ${data.pc_hex?.if || '--'}`, '#8b929e');
            setText('txt-asm-if', data.asm?.if || 'nop', '#98c379');
            setText('txt-hex-if', toHex(data.instr?.if), '#5c6370');

            setText('txt-pc-id', data.pc_hex?.id || '--', '#8b929e');
            setText('txt-asm-id', data.asm?.id || 'nop', '#98c379');
            setText('txt-hex-id', toHex(data.instr?.id), '#5c6370');
            if (data.id_info) {
                setText('txt-rs1-id', `rs1: x${data.id_info.rs1}`, '#abb2bf');
                setText('txt-rs2-id', `rs2: x${data.id_info.rs2}`, '#abb2bf');
                setText('txt-rd-id', `->rd: x${data.id_info.rd}`, '#abb2bf');
            }

            // 🚨 DECLARED EXACTLY ONCE AT THE TOP!
            const asmEx = (data.asm?.ex || "").trim().toLowerCase();
            const isBranchInst = asmEx.startsWith("b") && asmEx !== "break";
            const isJumpInst   = asmEx.startsWith("j");

            // --- UPDATE EX STAGE ---
            setText('txt-pc-ex', data.pc_hex?.ex || '--', '#8b929e');
            setText('txt-asm-ex', data.asm?.ex || 'nop', '#98c379');
            setText('txt-hex-ex', toHex(data.instr?.ex), '#5c6370');
            setText('txt-op-a', `OperandA: ${data.ex?.val_a || 0}`, '#abb2bf');
            setText('txt-op-b', `OperandB: ${data.ex?.val_b || 0}`, '#abb2bf');

            let exLabel = "Res:";
            if (isJumpInst) exLabel = "Ret Addr:";
            setText('txt-alu-ex', `${exLabel} ${data.ex?.alu_result || '0x0'}`, '#fff');

            // --- UPDATE MEM STAGE ---
            setText('txt-pc-mem', data.pc_hex?.mem || '--', '#8b929e');
            setText('txt-asm-mem', data.asm?.mem || 'nop', '#98c379');
            setText('txt-hex-mem', toHex(data.instr?.mem), '#5c6370');

            // --- UPDATE WB STAGE ---
            setText('txt-pc-wb', `PC: ${data.pc_hex?.wb || '--'}`, '#8b929e');
            setText('txt-asm-wb', data.asm?.wb || 'nop', '#98c379');
            setText('txt-hex-wb', toHex(data.instr?.wb), '#5c6370');

            const wbWire = svgDoc.getElementById('wire-wb-back');
            const rfBox = svgDoc.getElementById('regfile-box');
            const rfTitle = svgDoc.getElementById('txt-rf-title');
            const rfStatus = svgDoc.getElementById('txt-rf-status');

            if (data.wb && data.wb.we === 1 && data.wb.rd !== 0) {
                setText('txt-wb-reg', `x${data.wb.rd} = 0x${(data.wb.wdata >>> 0).toString(16)}`, '#98c379');
                if (wbWire) {
                    wbWire.setAttribute('stroke', '#98c379');
                    wbWire.setAttribute('stroke-width', '2');
                    wbWire.setAttribute('marker-end', 'url(#arrow-green)');
                }
                if (rfBox) rfBox.setAttribute('stroke', '#98c379');
                if (rfTitle) rfTitle.setAttribute('fill', '#98c379');
                if (rfStatus) {
                    rfStatus.textContent = `Writing x${data.wb.rd}`;
                    rfStatus.setAttribute('fill', '#98c379');
                }
            } else {
                setText('txt-wb-reg', `x${data.wb?.rd || 0} = 0x${(data.wb?.wdata || 0).toString(16)}`, '#5c6370');
                if (wbWire) {
                    wbWire.setAttribute('stroke', '#4b5363');
                    wbWire.setAttribute('stroke-width', '2');
                    wbWire.setAttribute('marker-end', 'url(#arrow)');
                }
                if (rfBox) rfBox.setAttribute('stroke', '#4b5363');
                if (rfTitle) rfTitle.setAttribute('fill', '#d7dae0');
                if (rfStatus) {
                    rfStatus.textContent = `Reading`;
                    rfStatus.setAttribute('fill', '#8b929e');
                }
            }

            // ==========================================
            //  FORWARDING UNIT LOGIC
            // ==========================================
            const fwdA = data.fwd?.a_sel || 0;
            const fwdB = data.fwd?.b_sel || 0;
            const wireMemFwd = svgDoc.getElementById('wire-mem-fwd');
            const wireWbFwd  = svgDoc.getElementById('wire-wb-fwd');
            const wireFwdA   = svgDoc.getElementById('wire-fwd-a');
            const wireFwdB   = svgDoc.getElementById('wire-fwd-b');
            const boxFwdUnit = svgDoc.getElementById('box-fwd-unit');

            const setWire = (wire, isActive) => {
                if (!wire) return;
                if (isActive) {
                    wire.setAttribute('stroke', '#4A90E2');
                    wire.setAttribute('stroke-width', '2');
                    wire.setAttribute('stroke-dasharray', '5,5');
                    wire.setAttribute('marker-end', 'url(#arrow-blue)');
                } else {
                    wire.setAttribute('stroke', '#4b5363');
                    wire.setAttribute('stroke-width', '2');
                    wire.setAttribute('stroke-dasharray', '4,4');
                    wire.setAttribute('marker-end', 'url(#arrow)');
                }
            };

            const usingMem = (fwdA === 1 || fwdB === 1);
            const usingWb  = (fwdA === 2 || fwdB === 2);

            setWire(wireMemFwd, usingMem);
            setWire(wireWbFwd, usingWb);
            setWire(wireFwdA, fwdA !== 0);
            setWire(wireFwdB, fwdB !== 0);

            if (fwdA !== 0 || fwdB !== 0) {
                setText('txt-fwd-status', `FWD A:${fwdA} B:${fwdB}`, '#4A90E2');
                if (boxFwdUnit) boxFwdUnit.setAttribute('stroke', '#4A90E2');
            } else {
                setText('txt-fwd-status', 'FWD UNIT', '#d7dae0');
                if (boxFwdUnit) boxFwdUnit.setAttribute('stroke', '#d7dae0');
            }

            // ==========================================
            //  BRANCH & JUMP LOGIC (EX -> IF)
            // ==========================================
            const branchWire = svgDoc.getElementById('wire-branch');
            const branchText = svgDoc.getElementById('txt-branch-target');

            const chkHaz = document.getElementById('chk-haz');
            const hazardOpacity = (chkHaz && chkHaz.checked === false) ? "0" : "1";

            if (branchWire && branchText) {
                branchWire.style.opacity = hazardOpacity;
                branchText.style.opacity = hazardOpacity;

                const valA = data.ex?.alu_op_a || 0;
                const valB = data.ex?.alu_op_b || 0;
                const pcDec = parseInt(data.pc_hex?.ex || "0", 16);

                let isTaken = false;
                let targetDec = 0;
                let reason = "";

                if (isJumpInst || isBranchInst) {
                    const asmWords = asmEx.split(/[\s,]+/);
                    const immStr = asmWords[asmWords.length - 1];
                    const immDec = parseInt(immStr.replace('+', '')) || 0;
                    const sign = immDec >= 0 ? "+" : "-";

                    if (isJumpInst) {
                        isTaken = true;
                        if (asmEx.startsWith("jalr")) {
                            targetDec = valA + immDec;
                            reason = `(Rs1 ${sign} ${Math.abs(immDec)})`;
                        } else {
                            targetDec = pcDec + immDec;
                            reason = `(${pcDec} ${sign} ${Math.abs(immDec)} = ${targetDec})`;
                        }
                    } else if (isBranchInst) {
                        targetDec = pcDec + immDec;
                        let opTaken = "==";
                        let opNotTaken = "≠";

                        if (asmEx.startsWith("beq")) { isTaken = (valA === valB); opTaken = "=="; opNotTaken = "≠"; }
                        else if (asmEx.startsWith("bne")) { isTaken = (valA !== valB); opTaken = "≠"; opNotTaken = "=="; }
                        else if (asmEx.startsWith("blt")) { isTaken = (valA < valB); opTaken = "<"; opNotTaken = "≥"; }
                        else if (asmEx.startsWith("bge")) { isTaken = (valA >= valB); opTaken = "≥"; opNotTaken = "<"; }

                        reason = isTaken ? `(${valA} ${opTaken} ${valB})` : `(${valA} ${opNotTaken} ${valB})`;
                    }
                }

                if (isTaken) {
                    branchWire.setAttribute('stroke', '#c678dd');
                    branchWire.setAttribute('stroke-width', '2');
                    branchWire.setAttribute('stroke-dasharray', 'none');
                    branchWire.setAttribute('marker-end', 'url(#arrow-purple)');

                    branchText.textContent = `TARGET: ${toHex(targetDec)} ${reason}`;
                    branchText.setAttribute('fill', '#c678dd');

                } else if (isBranchInst && !isTaken) {
                    branchWire.setAttribute('stroke', '#4b5363');
                    branchWire.setAttribute('stroke-width', '2');
                    branchWire.setAttribute('stroke-dasharray', '5,5');
                    branchWire.setAttribute('marker-end', 'url(#arrow)');

                    branchText.textContent = `NOT TAKEN ${reason}`;
                    branchText.setAttribute('fill', '#8b929e');

                } else {
                    branchWire.setAttribute('stroke', '#4b5363');
                    branchWire.setAttribute('stroke-width', '2');
                    branchWire.setAttribute('stroke-dasharray', '5,5');
                    branchWire.setAttribute('marker-end', 'url(#arrow)');
                    branchText.textContent = "";
                }
            }

            // ==========================================
            //  STALL & FLUSH HAZARD LOGIC (IF & ID)
            // ==========================================
            const haz = data.hazard || {};
            const isIfStall = haz.if_stall === 1;
            const isIdStall = haz.id_stall === 1;
            const isFlush   = haz.flush === 1;

            // Helper function to handle stage states
            const applyHazardState = (stagePrefix, stallFlag, flushFlag) => {
                const box       = svgDoc.getElementById(`stage-${stagePrefix}`);
                const bStall    = svgDoc.getElementById(`badge-stall-${stagePrefix}`);
                const tStall    = svgDoc.getElementById(`txt-stall-${stagePrefix}`);
                const bFlush    = svgDoc.getElementById(`badge-flush-${stagePrefix}`);
                const tFlush    = svgDoc.getElementById(`txt-flush-${stagePrefix}`);

                if (!box) return;

                // 1. FLUSH has the highest priority (Overrides stall)
                if (flushFlag) {
                    box.setAttribute('stroke', '#e06c75'); // Danger Red Border
                    if (bFlush) bFlush.setAttribute('opacity', hazardOpacity);
                    if (tFlush) tFlush.setAttribute('opacity', hazardOpacity);
                    if (bStall) bStall.setAttribute('opacity', '0');
                    if (tStall) tStall.setAttribute('opacity', '0');
                }
                // 2. STALL
                else if (stallFlag) {
                    box.setAttribute('stroke', '#e5c07b'); // Warning Yellow Border
                    if (bStall) bStall.setAttribute('opacity', hazardOpacity);
                    if (tStall) tStall.setAttribute('opacity', hazardOpacity);
                    if (bFlush) bFlush.setAttribute('opacity', '0');
                    if (tFlush) tFlush.setAttribute('opacity', '0');
                }
                // 3. NORMAL / IDLE STATE
                else {
                    box.setAttribute('stroke', '#555');    // Default Gray Border
                    if (bStall) bStall.setAttribute('opacity', '0');
                    if (tStall) tStall.setAttribute('opacity', '0');
                    if (bFlush) bFlush.setAttribute('opacity', '0');
                    if (tFlush) tFlush.setAttribute('opacity', '0');
                }
            };

            // Apply to the specific stages governed by your Chisel code
            applyHazardState('if', isIfStall, isFlush);
            applyHazardState('id', isIdStall, isFlush);



        } catch (error) {
            console.error("SVG Update Error:", error);
            appendTerminal(`[error] SVG CRASH: ${error.message}`);
        }
    }

    function updateRegisters(regs, wb_data) {
        if (!regs) return;
        const regGrid = document.getElementById('reg-grid');
        if (regGrid && regGrid.innerHTML === "") {
            for (let i = 0; i < 32; i++) {
                regGrid.innerHTML += `<div class="reg-box" id="reg-box-${i}"><span class="reg-name">x${i}</span><div class="reg-val" id="reg-val-${i}">0</div></div>`;
            }
        }

        const activeRd = (wb_data && wb_data.we === 1 && wb_data.rd !== 0) ? wb_data.rd : -1;

        for (let i = 0; i < 32; i++) {
            const boxEl = document.getElementById(`reg-box-${i}`);
            const valEl = document.getElementById(`reg-val-${i}`);

            if (boxEl) {
                boxEl.classList.remove('active-write');
                if (i === activeRd) boxEl.classList.add('active-write');
            }

            if (valEl && regs[i] !== undefined) {
                const hexVal = "0x" + (regs[i] >>> 0).toString(16);

                if (valEl.textContent !== hexVal && valEl.textContent !== "0") {
                    valEl.style.color = "#e5c07b";
                } else {
                    valEl.style.color = "#d7dae0";
                }
                valEl.textContent = hexVal;
            }
        }
    }

    // ==========================================
    // 4. DYNAMIC WORKSPACE LOADER
    // ==========================================
    async function initWorkspace() {
        const savedCodes = localStorage.getItem('chisel_ide_codes');
        if (savedCodes) {
            try {
                codes = JSON.parse(savedCodes);
                buildFileTreeAndEditor();
                return;
            } catch(e) { console.error("Could not parse local storage."); }
        }

        appendTerminal("[info] Fetching pristine workspace from server...");
        try {
            const response = await fetch('/workspace');
            const data = await response.json();

            for (const [name, content] of Object.entries(data.scala)) codes[name] = content;
            for (const [name, content] of Object.entries(data.asm)) codes[name] = content;

            localStorage.setItem('chisel_ide_codes', JSON.stringify(codes));
            buildFileTreeAndEditor();
            appendTerminal("[success] Workspace loaded successfully.");
        } catch (error) {
            appendTerminal(`[error] Failed to fetch workspace: ${error.message}`);
        }
    }

    function buildFileTreeAndEditor() {
        const treeContent = document.querySelector('.tree-content');
        treeContent.innerHTML = `<div class="tree-item"><span class="icon">📂</span> scala</div>`;

        let firstFile = null;

        for (const filename of Object.keys(codes)) {
            if (filename === 'BinaryFile') continue;
            if (!firstFile) firstFile = filename;

            const safeId = filename.replace('.scala', '');
            treeContent.innerHTML += `<div class="tree-item indent-1" id="tree-${safeId}" onclick="switchTab('${filename}')"><span class="icon">📄</span> ${filename}</div>`;
        }

        treeContent.innerHTML += `<div class="tree-item" style="margin-top: 15px;"><span class="icon">📂</span> programs</div>`;
        if (codes['BinaryFile'] !== undefined) {
            treeContent.innerHTML += `<div class="tree-item indent-1" id="tree-BinaryFile" onclick="switchTab('BinaryFile')"><span class="icon">📄</span> BinaryFile</div>`;
            if (!firstFile) firstFile = 'BinaryFile';
        }

        currentFile = firstFile;

        if (!currentFile) {
            appendTerminal("[error] CRASH PREVENTED: No files were found in your template folder.");
            document.getElementById('monaco-container').innerHTML = "<h3 style='color:#e06c75; padding: 20px;'>Error: No files loaded.</h3>";
            return;
        }

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('monaco-container'), {
                value: codes[currentFile],
                language: currentFile.endsWith('.scala') ? 'scala' : 'ini',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontFamily: "'SFMono-Regular', Consolas, 'Courier New', monospace",
                fontSize: 13
            });

            editor.onDidChangeModelContent(() => {
                codes[currentFile] = editor.getValue();
                localStorage.setItem('chisel_ide_codes', JSON.stringify(codes));
            });

            highlightTreeItem(currentFile);
        });
    }

    // ==========================================
    // 5. UI CONTROLS & COMPILER
    // ==========================================
    function switchView(target) {
        if (target === 'viz') {
            document.getElementById('monaco-container').style.display = 'none';
            document.getElementById('viz-container').style.display = 'flex';
            document.getElementById('tab-code').classList.remove('active');
            document.getElementById('tab-viz').classList.add('active');
            document.getElementById('tab-code').innerText = `📝 Code (${currentFile})`;
        } else {
            document.getElementById('viz-container').style.display = 'none';
            document.getElementById('monaco-container').style.display = 'block';
            document.getElementById('tab-viz').classList.remove('active');
            document.getElementById('tab-code').classList.add('active');
            document.getElementById('tab-code').innerText = `📝 Code Editor`;
            if(editor) editor.layout();
        }
    }

    function switchTab(filename) {
        if (!editor) return;
        currentFile = filename;
        const lang = filename.endsWith('.scala') ? 'scala' : 'ini';
        monaco.editor.setModelLanguage(editor.getModel(), lang);
        editor.setValue(codes[filename]);

        switchView('code');
        highlightTreeItem(filename);
    }

    function highlightTreeItem(filename) {
        document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
        const safeId = filename.replace('.scala', '');
        const treeEl = document.getElementById(`tree-${safeId}`);
        if (treeEl) treeEl.classList.add('active');
    }

    function exportProject() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(codes, null, 2));
        const anchor = document.createElement('a');
        anchor.setAttribute("href", dataStr);
        anchor.setAttribute("download", "riscv_project_backup.json");
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        appendTerminal("[info] Project exported to your computer successfully.");
    }

    async function resetCurrentFile() {
        if(confirm(`Are you sure you want to reset ONLY '${currentFile}' to its original state?`)) {
            appendTerminal(`[info] Fetching pristine version of ${currentFile}...`);
            try {
                // Fetch original files from server
                const response = await fetch('/workspace');
                const data = await response.json();

                // Find the specific file (either in scala or asm folders)
                const pristine = data.scala[currentFile] || data.asm[currentFile];

                if (pristine) {
                    codes[currentFile] = pristine;
                    localStorage.setItem('chisel_ide_codes', JSON.stringify(codes));
                    editor.setValue(pristine); // Update Monaco editor instantly
                    appendTerminal(`[success] ${currentFile} reset successfully.`);
                } else {
                    appendTerminal(`[error] Could not find original version of ${currentFile}.`);
                }
            } catch (error) {
                appendTerminal(`[error] Failed to reset file: ${error.message}`);
            }
        }
    }

    function resetAllCode() {
        if(confirm("⚠ DANGER: Are you sure? This will wipe your ENTIRE project and restore all pristine files from the server.")) {
            localStorage.removeItem('chisel_ide_codes');
            location.reload();
        }
    }

    async function compileCode() {
        clearTerminal();
        appendTerminal("[info] Submitting code to server...");

        if (!window.currentSessionId) {
            window.currentSessionId = 'sess_' + Math.random().toString(16).substring(2, 10);
            localStorage.setItem('chisel_session_id', window.currentSessionId);
        }
        socket.emit('join_session', window.currentSessionId);

        try {
            const scalaFiles = {};
            for (const [name, content] of Object.entries(codes)) {
                if (name.endsWith('.scala')) scalaFiles[name] = content;
            }

            const payload = {
                scala_files: scalaFiles,
                asm_code: codes['BinaryFile'] || "",
                session_id: window.currentSessionId
            };

            const response = await fetch('/compile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

            if (!response.ok) throw new Error(`Server returned status: ${response.status}`);
            const data = await response.json();

            if (data.status === "success") {
                appendTerminal(`[success] ${data.message}`);
                switchView('viz');
                setTimeout(() => { sendCommand('init'); }, 500);
            } else {
                appendTerminal(`[error] ${data.message}`);
            }
        } catch (error) {
            appendTerminal(`[error] JS Error: ${error.message}`);
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowRight") sendCommand('step');
        if (e.key === "ArrowLeft")  sendCommand('back');
    });

    ['chk-haz', 'chk-path'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', () => { if (lastPacket) updateSVG(lastPacket.enriched); });
    });

    initWorkspace();
</script>
